server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: campus-trade

  # ── 数据源 ──
  datasource:
    url: jdbc:mysql://localhost:3306/campus_trade
    username: root
    password: "031227"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # ── JPA ──
  jpa:
    hibernate:
      ddl-auto: update         # 开发用 update，生产用 validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        default_batch_fetch_size: 100

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379
      password:                # 无密码留空
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ── 文件上传 ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# ── JWT 配置 ──
jwt:
  # 密钥长度 >= 32 字节，生产环境从环境变量注入
#  secret: "campus_trade_secret_key_32bytes!!"
  secret: "8sK9zP2$eR7tY1uI3oP5aS7dF9gH2jK4"
  expire-minutes: 30          # access token 有效期（分钟）
  refresh-expire-days: 7      # refresh token 有效期（天）

# ── 文件存储（本地） ──
file:
  upload-dir: D:/Imagage      # 上传目录（相对于工作目录）
  access-url: http://localhost:8080/files  # 文件访问基础URL

logging:
  level:
    com.campus: debug
    org.springframework.security: warn
